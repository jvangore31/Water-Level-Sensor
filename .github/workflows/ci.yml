name: CI

on:
  push:
  pull_request:

jobs:
  application:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            bridge/package-lock.json
            dashboard/package-lock.json
      - run: npm run setup
      - run: npm test

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-arduino-cli@v2
      - run: arduino-cli core update-index --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
      - run: arduino-cli core install esp32:esp32 --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
      - run: arduino-cli lib install "Adafruit GFX Library" "Adafruit SSD1306"
      - run: arduino-cli compile --fqbn esp32:esp32:esp32 firmware/water_level_sensor
